<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow — A vanilla JavaScript student productivity suite with task management, Pomodoro timer, calendar, and auto-scheduling.">
  <meta name="theme-color" content="#0c0d14">
  <title>StudyFlow — Smart Student Productivity Suite</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%236366f1'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white'%3E%E2%98%85%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/tasks.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">&#9733;</span>
          <h1>StudyFlow</h1>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&times;</button>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-page="tasks">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </span>
          <span class="nav-label">Tasks</span>
        </a>
        <a href="#" class="nav-item" data-page="calendar">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </span>
          <span class="nav-label">Calendar</span>
        </a>
        <a href="#" class="nav-item" data-page="pomodoro">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </span>
          <span class="nav-label">Pomodoro</span>
        </a>
        <a href="#" class="nav-item" data-page="planner">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </span>
          <span class="nav-label">Planner</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button id="notifSettingsBtn" aria-label="Notification settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Notifications
        </button>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <header class="top-bar">
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="top-bar-search">
          <input type="text" id="globalSearch" placeholder="Search tasks..." />
        </div>
        <div class="top-bar-date" id="topBarDate"></div>
      </header>

      <section class="page active" id="page-dashboard"></section>
      <section class="page" id="page-tasks"></section>
      <section class="page" id="page-calendar"></section>
      <section class="page" id="page-pomodoro">
        <div id="pomodoroRoot" style="display:flex;flex-direction:column;align-items:center;min-height:60vh;">
          <div class="card" style="max-width:520px;width:100%;padding:32px;text-align:center;">
            <h2 style="font-size:24px;font-weight:800;margin-bottom:4px;">Study Session Timer</h2>
            <p style="color:var(--text-secondary);font-size:14px;margin-bottom:20px;">Focus cycles with breaks</p>
            <div id="pomodoroTaskInfo" style="display:none;margin-bottom:16px;padding:10px 14px;background:var(--accent-light);border-radius:var(--radius-md);text-align:center;">
              <div id="pomodoroTaskTitle" style="font-size:13px;font-weight:700;color:var(--accent);"></div>
              <div id="pomodoroTaskProgress" style="font-size:12px;color:var(--text-secondary);margin-top:2px;"></div>
            </div>

            <div class="pomodoro-duration-row" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;">
              <div><label style="font-size:11px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:2px;">TOTAL</label>
                <div style="display:flex;align-items:center;gap:4px;">
                  <button class="btn btn-icon btn-secondary" id="pTotalDec" style="width:30px;height:30px;padding:0;font-size:16px;font-weight:700;">-</button>
                  <input type="text" id="pTotal" value="60" style="width:50px;padding:4px;text-align:center;font-size:15px;font-weight:700;border:1px solid var(--border-color);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary);font-family:inherit;outline:none;">
                  <button class="btn btn-icon btn-secondary" id="pTotalInc" style="width:30px;height:30px;padding:0;font-size:16px;font-weight:700;">+</button>
                </div>
              </div>
              <div><label style="font-size:11px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:2px;">FOCUS</label>
                <div style="display:flex;align-items:center;gap:4px;">
                  <button class="btn btn-icon btn-secondary" id="pFocusDec" style="width:30px;height:30px;padding:0;font-size:16px;font-weight:700;">-</button>
                  <input type="text" id="pFocus" value="20" style="width:50px;padding:4px;text-align:center;font-size:15px;font-weight:700;border:1px solid var(--border-color);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary);font-family:inherit;outline:none;">
                  <button class="btn btn-icon btn-secondary" id="pFocusInc" style="width:30px;height:30px;padding:0;font-size:16px;font-weight:700;">+</button>
                </div>
              </div>
              <div><label style="font-size:11px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:2px;">BREAK</label>
                <div style="display:flex;align-items:center;gap:4px;">
                  <button class="btn btn-icon btn-secondary" id="pBreakDec" style="width:30px;height:30px;padding:0;font-size:16px;font-weight:700;">-</button>
                  <input type="text" id="pBreak" value="5" style="width:50px;padding:4px;text-align:center;font-size:15px;font-weight:700;border:1px solid var(--border-color);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary);font-family:inherit;outline:none;">
                  <button class="btn btn-icon btn-secondary" id="pBreakInc" style="width:30px;height:30px;padding:0;font-size:16px;font-weight:700;">+</button>
                </div>
              </div>
            </div>

            <div style="position:relative;width:240px;height:240px;margin:0 auto 16px;">
              <svg width="240" height="240" viewBox="0 0 240 240">
                <circle cx="120" cy="120" r="80" fill="none" stroke="var(--bg-input)" stroke-width="6"/>
                <circle id="pomodoroTotalRing" cx="120" cy="120" r="80" fill="none" stroke="var(--accent)" stroke-width="6" stroke-linecap="round" transform="rotate(-90,120,120)" style="transition:stroke-dashoffset .5s;opacity:.4"/>
                <circle cx="120" cy="120" r="100" fill="none" stroke="var(--bg-input)" stroke-width="8"/>
                <circle id="pomodoroRingProgress" cx="120" cy="120" r="100" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" transform="rotate(-90,120,120)" style="transition:stroke-dashoffset .5s"/>
              </svg>
              <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <span id="pomodoroDisplay" style="font-size:44px;font-weight:800;color:var(--text-primary);letter-spacing:2px;font-variant-numeric:tabular-nums;">20:00</span>
                <span id="pomodoroPhase" style="font-size:13px;font-weight:600;color:var(--accent);margin-top:2px;">Ready</span>
                <span id="pomodoroStatus" style="font-size:11px;color:var(--text-secondary);margin-top:2px;">Cycle 0 &middot; 60 min left</span>
              </div>
            </div>

            <div style="margin-bottom:16px;">
              <div style="height:4px;background:var(--bg-input);border-radius:2px;overflow:hidden;">
                <div id="pomodoroProgressBar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:2px;transition:width .5s"></div>
              </div>
              <span id="pomodoroPctLabel" style="font-size:11px;color:var(--text-secondary);margin-top:4px;display:block;">0% of total study time completed</span>
            </div>

            <div id="pomodoroButtons" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
              <button class="btn btn-primary" id="pomodoroStartBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start</button>
              <button class="btn btn-secondary" id="pomodoroPauseBtn" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause</button>
              <button class="btn btn-primary" id="pomodoroResumeBtn" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Resume</button>
              <button class="btn btn-secondary" id="pomodoroResetBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Reset</button>
            </div>
          </div>
        </div>
      </section>
      <section class="page" id="page-planner"></section>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/taskManager.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/pomodoro.js"></script>
  <script src="js/studyPlanner.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
